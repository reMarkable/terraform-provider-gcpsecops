on:
  pull_request:

name: Capabilities

jobs:
  get_caps:
    name: Get capabilities
    uses: ./.github/workflows/capabilities_get_caps.yaml
    with:
      head: ${{ github.event.pull_request.head.sha }}
      base: ${{ github.event.pull_request.base.sha }}

  comment_diff:
    needs: get_caps
    uses: ./.github/workflows/capabilities_comment_diff.yaml
